_format_version: "3.0"

upstreams:
  - name: property-cluster
    targets:
      - target: host.docker.internal:8082
        weight: 100
      - target: host.docker.internal:8083
        weight: 100

services:
  # Microservice 1: Account
  - name: account-service
    url: http://host.docker.internal:8081
    routes:
      - name: account-route
        paths:
          - /api/account
        strip_path: false
    # Thêm CORS dạng rút gọn nhất
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
          methods:
            - GET
            - POST
            - OPTIONS

  # Microservice 2: Property
  - name: property-service
    host: property-cluster
    path: /api/property
    protocol: http
    routes:
      - name: property-route
        paths:
          - /api/property
        strip_path: false
  # 👇 THÊM ĐOẠN NÀY VÀO DƯỚI PROPERTY-SERVICE 👇
      - name: categories-route
        paths:
          - /api/categories
        strip_path: false
  # Thêm route này để Kong chuyển tiếp yêu cầu upload
      - name: upload-image-route
        paths:
          - /api/upload/image
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
          methods:
            - GET
            - POST
            - OPTIONS

version: '3.8'

services:
  # --- CỤM DATABASE MASTER-REPLICA ---
  # --- CỤM DATABASE MASTER-REPLICA ---
  db-master:
    image: bitnami/postgresql:latest
    container_name: bds-db-master
    ports:
      - "5431:5432"
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=postgres # 🌟 Đã sửa thành postgres làm cửa chính
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./pg_master_data:/bitnami/postgresql # 🌟 KHIÊN BẢO VỆ DỮ LIỆU MASTER
    networks:
      - bds-network

  db-replica:
    image: bitnami/postgresql:latest
    container_name: bds-db-replica
    ports:
      - "5432:5432"
    depends_on:
      - db-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_MASTER_HOST=db-master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
    volumes:
      - ./pg_replica_data:/bitnami/postgresql # 🌟 KHIÊN BẢO VỆ DỮ LIỆU REPLICA
    networks:
      - bds-network

  # --- CỤM ĐIỀU PHỐI (NGINX & KONG) ---
  nginx-db-lb:
    image: nginx:latest
    container_name: bds-nginx-db
    ports:
      - "5433:5433"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - db-master
      - db-replica
    networks:
      - bds-network

  kong-gateway:
    image: kong:3.6.0-ubuntu
    container_name: bds-kong-gateway
    ports:
      - "8000:8000"
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
    networks:
      - bds-network

  # --- CỤM HÀNG ĐỢI (KAFKA & ZOOKEEPER) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bds-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bds-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bds-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - bds-network

  # --- CỤM GIÁM SÁT ---
  prometheus:
    image: prom/prometheus:latest
    container_name: bds_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - bds-network

  # --- CỤM CACHING ---
  redis:
    image: redis:alpine
    container_name: bds_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - bds-network

  # --- CỤM LƯU TRỮ FILE/ẢNH ---
  minio:
    image: minio/minio
    container_name: bds_minio
    ports:
      - "9000:9000" # Cổng API cho Backend gọi
      - "9001:9001" # Cổng giao diện Web quản lý
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "minio_password123"
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - bds-network

  # --- MÀN HÌNH GIÁM SÁT ---
  grafana:
    image: grafana/grafana:latest
    container_name: bds_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Mật khẩu đăng nhập Web Grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - bds-network

  # --- CỤM TỰ ĐỘNG BACKUP DATABASE ---
  postgres_backup:
    image: prodrigestivill/postgres-backup-local
    container_name: bds_pg_backup
    environment:
      - POSTGRES_HOST=db-master # Trỏ đúng vào tên service Master của bạn
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bds_account,bds_property,bds_booking # Sao lưu cả 3 database mới
      - SCHEDULE=@daily # Tự động chạy hàng ngày
      - BACKUP_KEEP_DAYS=7 # Giữ lại bản backup trong 7 ngày
    volumes:
      - ./pg_backups:/backups
    depends_on:
      - db-master
    restart: unless-stopped
    networks:
      - bds-network
networks:
  bds-network:
    driver: bridge
version: '3.8'

services:
  # --- CỤM DATABASE MASTER-REPLICA ---
  db-master:
    image: bitnami/postgresql:latest
    container_name: bds-db-master
    ports:
      - "5431:5432"
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=real_estate
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bds-network

  db-replica:
    image: bitnami/postgresql:latest
    container_name: bds-db-replica
    ports:
      - "5432:5432"
    depends_on:
      - db-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_MASTER_HOST=db-master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
    networks:
      - bds-network

  # --- CỤM ĐIỀU PHỐI (NGINX & KONG) ---
  nginx-db-lb:
    image: nginx:latest
    container_name: bds-nginx-db
    ports:
      - "5433:5433"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - db-master
      - db-replica
    networks:
      - bds-network

  kong-gateway:
    image: kong:3.6.0-ubuntu
    container_name: bds-kong-gateway
    ports:
      - "8000:8000"
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
    networks:
      - bds-network

  # --- CỤM HÀNG ĐỢI (KAFKA & ZOOKEEPER) ---
    # 5. ZOOKEEPER
  zookeeper:
      image: confluentinc/cp-zookeeper:7.5.0
      container_name: bds-zookeeper
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000
      networks:
        - bds-network

    # 6. KAFKA BROKER
  kafka:
      image: confluentinc/cp-kafka:7.5.0
      container_name: bds-kafka
      ports:
        - "9092:9092"
      depends_on:
        - zookeeper
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      networks:
        - bds-network

networks:
  bds-network:
    driver: bridge